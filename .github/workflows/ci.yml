name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: >
          npx eslint
          frontend/src/App.jsx
          frontend/src/DashboardLayout.jsx
          frontend/src/Pages/Landing.jsx
          frontend/src/Pages/Candidates/Profile.jsx
          frontend/src/Pages/Recruiters/CreateJob.jsx
          frontend/src/Pages/Recruiters/Profile.jsx
          frontend/src/hooks/useFormValidation.js
          frontend/src/lib/api.js
          --config frontend/.eslintrc.cjs

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: job-tracker-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: job-tracker-frontend:ci
          build-args: |
            VITE_API_URL=/api
