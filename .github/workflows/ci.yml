name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint:frontend

      - name: Build Frontend
        run: npm run build:frontend

      - name: Copy Backend Env File
        run: cp backend/.env.example backend/.env

      - name: Start Database
        run: |
          npm run db:up
          echo "Waiting for database to be healthy..."
          for i in {1..30}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' job_tracker_db 2>/dev/null || echo "starting")
            echo "Current status: $status"
            if [ "$status" = "healthy" ]; then
              echo "Database is healthy!"
              exit 0
            fi
            sleep 2
          done
          echo "Error: Database did not become healthy in time"
          exit 1

      - name: Run Backend Smoke Test
        run: |
          npm run start:backend &
          sleep 5
          npm run smoke:backend
